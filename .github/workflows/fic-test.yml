name: GitHub FIC Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-fic:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login via FIC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Show Azure Context
      run: az account show

    - name: Get ARM Token
      run: |
        TOKEN=$(az account get-access-token \
          --resource https://management.azure.com \
          --query accessToken -o tsv)

        echo "=============================="
        echo "Decoded ARM JWT Payload"
        echo "=============================="

        PAYLOAD=$(echo $TOKEN | cut -d '.' -f2)

        LEN=$((${#PAYLOAD} % 4))
        if [ $LEN -eq 2 ]; then PAYLOAD="${PAYLOAD}=="; fi
        if [ $LEN -eq 3 ]; then PAYLOAD="${PAYLOAD}="; fi

        echo $PAYLOAD | tr '_-' '/+' | base64 -d | jq

    - name: Dump GitHub OIDC Claims
      run: |
        echo "=============================="
        echo "Requesting GitHub OIDC Token"
        echo "=============================="

        RESPONSE=$(curl -s \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange")

        GITHUB_TOKEN=$(echo $RESPONSE | jq -r '.value')

        echo ""
        echo "=============================="
        echo "Decoded GitHub OIDC Claims"
        echo "=============================="

        PAYLOAD=$(echo $GITHUB_TOKEN | cut -d '.' -f2)

        LEN=$((${#PAYLOAD} % 4))
        if [ $LEN -eq 2 ]; then PAYLOAD="${PAYLOAD}=="; fi
        if [ $LEN -eq 3 ]; then PAYLOAD="${PAYLOAD}="; fi

        echo $PAYLOAD | tr '_-' '/+' | base64 -d | jq
